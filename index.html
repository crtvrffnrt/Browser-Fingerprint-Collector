<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security Test Beacon</title>
</head>
<body>
  <h1>Security Callback Test</h1>
  <p>This page sends a harmless GET beacon to the configured callback URL.</p>

  <script>
    (function () {
      var callback = "__CALLBACK_URL__";
      var plugins = [];
      try {
        plugins = Array.prototype.slice.call(navigator.plugins || []).map(function (plugin) {
          return plugin.name;
        });
      } catch (e) {}

      var params = new URLSearchParams({
        source: "browser-test",
        ua: navigator.userAgent || "",
        screen: ((screen && screen.width) ? screen.width : "") + "x" + ((screen && screen.height) ? screen.height : ""),
        viewport: (window.innerWidth + "x" + window.innerHeight),
        lang: navigator.language || "",
        languages: (navigator.languages || []).join(","),
        platform: navigator.platform || "",
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
        timezoneOffset: String(new Date().getTimezoneOffset()),
        hardwareConcurrency: String(navigator.hardwareConcurrency || ""),
        deviceMemory: String(navigator.deviceMemory || ""),
        maxTouchPoints: String(navigator.maxTouchPoints || 0),
        webdriver: String(navigator.webdriver || false),
        plugins: plugins.join(","),
        ts: String(Date.now())
      });

      var img = new Image();
      img.src = callback + "?" + params.toString();
    })();
  </script>
</body>
</html>
