<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security Test Beacon</title>
</head>
<body>
  <h1>Security Callback Test</h1>
  <p>This page sends a harmless GET beacon to the configured callback URL.</p>

  <script>
    (function () {
      var callback = "__CALLBACK_URL__";
      var params = new URLSearchParams({
        source: "browser-test",
        ua: navigator.userAgent || "",
        screen: (window.innerWidth + "x" + window.innerHeight),
        lang: navigator.language || "",
        ts: String(Date.now())
      });

      var img = new Image();
      img.src = callback + "?" + params.toString();
    })();
  </script>
</body>
</html>
