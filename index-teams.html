<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Header and Referrer Callback Test</title>
</head>
<body>
  <h1>Header + Referrer Callback Test</h1>
  <p>Use this template to exercise referrer/origin capture on the listener.</p>

  <a id="trigger" href="#">Trigger callback</a>

  <script>
    document.getElementById("trigger").addEventListener("click", function (e) {
      e.preventDefault();
      var callback = "__CALLBACK_URL__";
      var qs = new URLSearchParams({
        source: "referrer-test",
        referrer: document.referrer || "",
        origin: location.origin || "",
        token: "__TOKEN__",
        ts: String(Date.now())
      });

      fetch(callback + "?" + qs.toString(), {
        method: "GET",
        mode: "no-cors",
        credentials: "include"
      }).catch(function () {});
    });
  </script>
</body>
</html>
