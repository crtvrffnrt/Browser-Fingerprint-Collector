<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Security POST Callback Test</title>
</head>
<body>
  <h1>POST Callback Test</h1>
  <p>This page sends a JSON POST request to <code>__CALLBACK_URL__</code>.</p>

  <script>
    (async function () {
      var callback = "__CALLBACK_URL__";
      var payload = {
        source: "browser-post-test",
        userAgent: navigator.userAgent || "",
        language: navigator.language || "",
        timezoneOffset: new Date().getTimezoneOffset(),
        url: location.href,
        ts: Date.now()
      };

      try {
        await fetch(callback, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          mode: "no-cors"
        });
      } catch (e) {
        console.log("POST callback failed", e);
      }
    })();
  </script>
</body>
</html>
